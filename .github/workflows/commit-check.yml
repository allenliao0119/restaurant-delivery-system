name: CI - Commit Lint & Checklist Update

on:
  push:
    branches:
      - main
      - dev
      - feat/**
      - hotfix/**

jobs:
  # --------------------------------------------------
  # 0️⃣ Check Commit Format
  # --------------------------------------------------
  check-format:
    name: 🔍 Check Commit Format
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if commit has issue and task
        id: check
        run: |
          MESSAGE=$(git log -1 --pretty=%B)
          if echo "$MESSAGE" | grep -qE '\(#[0-9]+,\s*task:[0-9]+\)'; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Commit contains (#issue, task:n) format"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping - no (#issue, task:n) format found"
          fi

  # --------------------------------------------------
  # 1️⃣ Commit Message Lint
  # --------------------------------------------------
  commit-lint:
    name: 🧾 Lint Commit Messages
    runs-on: ubuntu-latest
    needs: check-format
    if: needs.check-format.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v5
        with:
          configFile: commitlint.config.js

  # --------------------------------------------------
  # 2️⃣ Checklist Auto Update
  # --------------------------------------------------
  checklist:
    name: ✅ Update Issue Checklist
    runs-on: ubuntu-latest
    needs: [check-format, commit-lint]
    if: needs.check-format.outputs.should_run == 'true'
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Extract latest commit message
        id: commit
        run: |
          echo "MESSAGE=$(git log -1 --pretty=%B)" >> $GITHUB_ENV

      - name: Update checklist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const msg = process.env.MESSAGE
            const issueMatch = msg.match(/#(\d+)/)
            const taskMatches = [...msg.matchAll(/task:(\d+)/g)]

            if (!issueMatch || taskMatches.length === 0) {
              console.log("ℹ️ No issue or task found in commit message.")
              return
            }

            const issue_number = parseInt(issueMatch[1])
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            })

            let body = issue.data.body.split("\n")

            taskMatches.forEach(m => {
              const taskIndex = parseInt(m[1])
              console.log(`🔹 Marking task #${taskIndex} as done.`)
              let count = 0
              body = body.map(line => {
                if (line.match(/- \[[x ]\]/)) {
                  count++
                  if (count === taskIndex && line.match(/- \[ \]/)) {
                    return line.replace("- [ ]", "- [x]")
                  }
                }
                return line
              })
            })

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: body.join("\n")
            })

            console.log(`✅ Updated checklist for Issue #${issue_number}`)
