version: '3.9'

services:
  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: restaurant-api
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=restaurant
      - DB_PORT=5432
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - restaurant-net

  db:
    image: postgres:16
    container_name: restaurant-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurant
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - restaurant-net

volumes:
  db_data:

networks:
  restaurant-net:
